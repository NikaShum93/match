<style>
*, *::before, *::after { box-sizing: border-box; }
body, html {
  margin: 0; padding: 0; width: 100vw; height: 100vh;
  overflow: hidden; background: transparent;
  font-family: sans-serif;
}
  #scene{
    position:fixed;
    inset:0;
}
#bg-layer {
  position: fixed; inset: 0;
  background-color: transparent;
  background-size: cover; background-position: center;
  z-index: 0;
}
#canvas-layer {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 10;
}
#loader-screen {
  position: fixed; inset: 0; background: rgba(20,20,25,0.4); backdrop-filter: blur(4px);
  z-index: 999999; display: none; flex-direction: column; justify-content: center; align-items: center;
}
.loader-box {
  background: rgba(10,10,15,0.85); padding: 30px; border-radius: 16px; border: 1px solid rgba(0,255,204,0.3);
  box-shadow: 0 10px 40px rgba(0,0,0,0.8); text-align: center; color: #fff;
}
.spinner {
  width: 40px; height: 40px; border: 4px solid rgba(0,255,204,0.2); border-top-color: #00ffcc;
  border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.card {
  position: absolute;
  display: flex; justify-content: center; align-items: center;
  text-align: center; cursor: pointer;
  border-radius: 8px; padding: 6px;
  word-break: break-word;
  transition: opacity 0.5s ease, transform 0.15s ease;
  user-select: none;
}
.card::after {
  content: ''; position: absolute; inset: -8px; z-index: 999; cursor: pointer;
}
.card.glitch-anim { animation: glitch 0.4s steps(1) infinite; }
.card.selected { z-index: 100; }
.card.matched { pointer-events: none; cursor: default; }
.anim-sel-float { animation: selFloat 2s ease-in-out infinite; }
.anim-sel-pulse { animation: selPulse 1s ease infinite; }
.anim-sel-shake { animation: selShake 0.5s ease infinite; }
.anim-sel-glow  { filter: drop-shadow(0 0 15px var(--glow,#00ffcc)) brightness(1.2); }
@keyframes selFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
@keyframes selPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
@keyframes selShake { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
.idle-float { animation: selFloat 3s ease-in-out infinite; }
.idle-pulse { animation: selPulse 2s ease infinite; }
.idle-heartbeat { animation: heartbeat 1.5s ease-in-out infinite; }
@keyframes heartbeat { 0%,100% { transform: scale(1); } 15% { transform: scale(1.1); } 30% { transform: scale(1); } 45% { transform: scale(1.1); } }
@keyframes sparkleAnim { 0% { transform:translateY(0) scale(1); opacity:1; } 100% { transform:translateY(-30px) scale(0); opacity:0; } }
#tooltip-box {
  position: absolute; z-index: 9999;
  padding: 10px 14px; border-radius: 8px;
  font-size: 20px; font-weight: bold;
  pointer-events: none; display: none;
  max-width: 260px; text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}
#fb-img-box, #fb-txt-box { position: fixed; z-index: 60000; display: none; }
#fbimg { display: block; width: 100%; height: 100%; object-fit: contain; }
#fbtxt { font-weight: 900; text-align: center; line-height: 1.4; word-break: break-word; width: 100%; }
@keyframes popUp { 0% { transform: scale(0.3); opacity: 0; } 70% { transform: scale(1.08); opacity: 1; } 100% { transform: scale(1); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(80px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes zoomIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
@keyframes wobble { 0%,100%{transform:rotate(0deg);} 25%{transform:rotate(-6deg);} 75%{transform:rotate(6deg);} }
@keyframes glitch {
  0%,100% { filter: none; }
  20% { filter: hue-rotate(90deg) brightness(1.3); }
  40% { filter: hue-rotate(180deg) brightness(0.8); }
  60% { filter: hue-rotate(270deg) brightness(1.2); }
  80% { filter: hue-rotate(45deg); }
}
@keyframes distort { 0%,100%{transform:skew(0deg,0deg);} 25%{transform:skew(6deg,2deg);} 75%{transform:skew(-6deg,-2deg);} }
@keyframes scaleUp { 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }
@keyframes scaleDown { 0%,100%{transform:scale(1);} 50%{transform:scale(0.88);} }
.fx-particle {
  position: fixed; pointer-events: none; z-index: 30000; font-size: 24px;
  animation: fxFly var(--dur,1s) cubic-bezier(0.25,1,0.5,1) forwards;
}
@keyframes fxFly {
  0%   { opacity: 1; transform: translate(0,0) scale(var(--s,1)) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(var(--se,0.5)) rotate(var(--rot,180deg)); }
}
.fx-rain {
  position: fixed; pointer-events: none; z-index: 30000; width: 2px; height: 30px; background: rgba(100,200,255,0.8);
  animation: rainDrop 0.6s linear forwards;
}
@keyframes rainDrop { 0% { transform: translateY(-50px); opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }
#flash-overlay { position: fixed; inset: 0; background: #fff; z-index: 40000; opacity: 0; pointer-events: none; }
@keyframes flashFx { 0% { opacity: 0.8; } 20% { opacity: 0; } 40% { opacity: 0.5; } 100% { opacity: 0; } }
.dot-marker {
  width: var(--d-size); height: var(--d-size);
  background: var(--d-color); border-radius: 50%;
  display: flex; justify-content: center; align-items: center;
  font-size: calc(var(--d-size) * 0.8);
  box-shadow: 0 0 10px var(--d-color); pointer-events: none;
  transition: transform 0.15s ease, box-shadow 0.15s ease, text-shadow 0.15s ease;
}
.dot-square { border-radius: 4px; }
.dot-pulse { animation: dotPulse 1.5s infinite; }
.dot-glow { box-shadow: 0 0 20px var(--d-color), inset 0 0 10px #fff; }
.dot-star { background: transparent; box-shadow: none; text-shadow: 0 0 10px var(--d-color); }
@keyframes dotPulse {
  0% { box-shadow: 0 0 0 0 var(--d-color); }
  70% { box-shadow: 0 0 0 calc(var(--d-size)*0.5) transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}
.card.selected .dot-marker { box-shadow: 0 0 0 3px var(--glow,#00ffcc), 0 0 20px var(--glow,#00ffcc); transform: scale(1.2); }
.card.selected .dot-star { text-shadow: 0 0 20px var(--glow,#00ffcc), 0 0 40px var(--glow,#00ffcc); transform: scale(1.2); }
.anim-sel-float .dot-marker, .anim-sel-float .dot-star { animation: selFloat 2s ease-in-out infinite; }
.anim-sel-pulse .dot-marker, .anim-sel-pulse .dot-star { animation: selPulse 1s ease infinite; }
.anim-sel-shake .dot-marker, .anim-sel-shake .dot-star { animation: selShake 0.5s ease infinite; }
.anim-sel-glow .dot-marker { box-shadow: 0 0 0 3px var(--glow,#00ffcc), 0 0 25px var(--glow,#00ffcc), inset 0 0 10px rgba(255,255,255,0.3); }
.anim-sel-glow .dot-star { text-shadow: 0 0 20px var(--glow,#00ffcc), 0 0 40px var(--glow,#00ffcc), 0 0 60px var(--glow,#00ffcc); }
.card-has-img { filter: none; }
.card-has-img.glow-idle { filter: drop-shadow(0 0 8px var(--idle-glow, #00ffcc)) drop-shadow(0 0 15px var(--idle-glow, #00ffcc)); }
#vol-btn {
  position: fixed; bottom: 18px; right: 18px; z-index: 99999;
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.08); backdrop-filter: blur(8px);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.15s;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.12); padding: 0;
}
#vol-btn:hover { background: rgba(255,255,255,0.18); transform: scale(1.1); }
#vol-btn svg { display: block; }
#vol-slider-wrap {
  position: fixed; bottom: 62px; right: 10px; z-index: 99998;
  background: rgba(15,15,20,0.88); backdrop-filter: blur(10px);
  border-radius: 12px; padding: 12px 10px 8px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 8px 24px rgba(0,0,0,0.5);
  display: none; flex-direction: column; align-items: center; gap: 6px;
}
#vol-slider-wrap.open { display: flex; }
#vol-slider {
  writing-mode: vertical-lr; direction: rtl;
  width: 20px; height: 80px;
  accent-color: #00ffcc; cursor: pointer;
  -webkit-appearance: slider-vertical; appearance: auto;
}
#vol-label { font-size: 10px; color: rgba(255,255,255,0.45); letter-spacing: 0.5px; }
</style>

<body>

<div id="scene">

<div id="loader-screen">
  <div class="loader-box">
    <div class="spinner"></div>
    <div id="loader-text" style="font-weight:bold;font-size:16px;">
      Без паники — игра публикуется.<br>
      <span style="font-size:12px;color:#aaa;margin-top:8px;display:block;">Минутку... ожидаем ответ сервера</span>
    </div>
  </div>
</div>

<div id="bg-layer"></div>

<div id="game-wrapper" style="width:1280px;height:720px;position:absolute;left:50%;top:50%;transform-origin:center;transform:translate(-50%,-50%);overflow:visible;z-index:20;">
  <div id="layer" style="position:absolute;inset:0;z-index:20;"></div>
  <div id="tooltip-box"></div>
</div>

<canvas id="canvas-layer"></canvas>
<div id="flash-overlay"></div>

<div id="vol-slider-wrap">
  <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="1">

</div>

<button id="vol-btn" title="Громкость">
  <svg id="vol-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
       stroke="rgba(255,255,255,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <path id="vol-wave1" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    <path id="vol-wave2" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
  </svg>
</button>

</div> <!-- конец scene -->

<div id="feedback-layer" style="position:fixed;inset:0;z-index:60000;pointer-events:none;">
  <div id="fb-img-box">
    <img id="fbimg" src="" alt="">
  </div>

  <div id="fb-txt-box"
       style="flex-direction:column;align-items:center;justify-content:center;box-sizing:border-box;">
    <div id="fbtxt"></div>

<script>
const JSON_BASE = "https://nikashum93.github.io/texts/data/";

let CONFIG       = null;
let selectedCard = null;
let matchedPairs = 0;
let totalPairs   = 0;
let sounds       = {};
let activeLines  = [];
let globalVolume = 1;
let volMuted     = false;
let audioUnlocked = false;

// ─── ГРОМКОСТЬ ───────────────────────────────────────────────
function updateVolIcon() {
  const w1 = document.getElementById('vol-wave1');
  const w2 = document.getElementById('vol-wave2');
  const v  = volMuted ? 0 : globalVolume;
  if (v === 0)       { w1.style.display = 'none'; w2.style.display = 'none'; }
  else if (v < 0.5)  { w1.style.display = '';     w2.style.display = 'none'; }
  else               { w1.style.display = '';     w2.style.display = '';     }
}
function applyVolume() {
  const v = volMuted ? 0 : globalVolume;
  Object.values(sounds).forEach(a => { try { a.volume = v; } catch(_){} });
  document.getElementById('vol-label').textContent = Math.round(v * 100) + '%';
  document.getElementById('vol-slider').value = v;
  updateVolIcon();
}
document.getElementById('vol-btn').addEventListener('click', () => {
  document.getElementById('vol-slider-wrap').classList.toggle('open');
});
document.getElementById('vol-slider').addEventListener('input', e => {
  globalVolume = parseFloat(e.target.value);
  volMuted = globalVolume === 0;
  applyVolume();
});

// ─── РАЗБЛОКИРОВКА ЗВУКА ─────────────────────────────────────
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
}
// ─── ЗВУКИ ───────────────────────────────────────────────────
function loadSounds() {
  const s = CONFIG.sounds || {};
  ['correct', 'wrong', 'win'].forEach(key => {
    if (s[key]) {
      const a = new Audio(s[key]);
      a.preload = 'auto';
      a.volume  = volMuted ? 0 : globalVolume;
      sounds[key] = a;
    }
  });
}

let _audioCtx = null;
const _audioBuffers = {};

function getAudioCtx() {
  if (!_audioCtx) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_audioCtx.state === 'suspended') {
    _audioCtx.resume();
  }
  return _audioCtx;
}

function playSound(key) {
  try {
    if (!sounds[key]) return;
    const ctx = getAudioCtx();
    const src = sounds[key].src;

    function play(buffer) {
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      const gain = ctx.createGain();
      gain.gain.value = volMuted ? 0 : globalVolume;
      source.connect(gain);
      gain.connect(ctx.destination);
      source.start(0);
    }

    if (_audioBuffers[key]) {
      play(_audioBuffers[key]);
      return;
    }

    fetch(src)
      .then(r => r.arrayBuffer())
      .then(buf => ctx.decodeAudioData(buf))
      .then(decoded => {
        _audioBuffers[key] = decoded;
        play(decoded);
      })
      .catch(() => {});
  } catch(_) {}
}
// ─── УТИЛИТЫ ─────────────────────────────────────────────────
function cleanUrl(val) { return val.trim().replace(/\s+/g, ''); }
function isImageUrl(val) {
  if (!val) return false;
  const s = cleanUrl(val);
  if (/^https?:\/\//i.test(s) || /^data:image\//i.test(s)) return true;
  if (/\.(jpeg|jpg|gif|png|webp|svg)(\?.*)?$/i.test(s) && !/\s/.test(s)) return true;
  return false;
}
function renderMath(el, txt) {
  el.innerHTML = txt;
  if (window.MathJax && window.MathJax.typesetPromise)
    window.MathJax.typesetPromise([el]).catch(() => {});
}
function hexToRgba(hex, alpha) {
  if (!hex) return `rgba(0,0,0,${alpha})`;
  const h = hex.replace('#', '');
  return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${alpha})`;
}

// ─── ЗАГРУЗКА ─────────────────────────────────────────────────
async function init() {
  const params  = new URLSearchParams(location.search);
  const id      = params.get('id');
  const preview = params.get('preview');
  document.getElementById('loader-screen').style.display = 'none';

  if (preview) {
    window.addEventListener('message', e => {
      if (e.data && e.data.type === 'LOAD_CONFIG') {
        CONFIG = e.data.config;
        startGame();
      }
    });
    return;
  }

  if (id) {
    try {
      const res = await fetch(`${JSON_BASE}${encodeURIComponent(id)}.json?t=` + Date.now());
      if (res.ok) { CONFIG = await res.json(); startGame(); return; }
      else throw new Error('Not found');
    } catch(e) {
      document.getElementById('loader-screen').style.display = 'flex';
      try {
        CONFIG = await fetchWithRetry(`${JSON_BASE}${encodeURIComponent(id)}.json`);
        document.getElementById('loader-screen').style.display = 'none';
        startGame();
      } catch(err) {
        document.getElementById('loader-text').innerHTML = '❌ Ошибка: Файл не найден.';
        document.querySelector('.spinner').style.display = 'none';
      }
    }
  }
}

async function fetchWithRetry(url, retries = 20, delay = 2000) {
  const textEl = document.getElementById('loader-text');
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(url + "?t=" + Date.now());
      if (res.ok) return await res.json();
    } catch(err) {}
    if (i < retries - 1) {
      if (i > 1 && textEl)
        textEl.innerHTML = `Без паники — игра публикуется.<br><span style="font-size:12px;color:#aaa;display:block;margin-top:8px;">Ждём сервер (Попытка ${i+1} из ${retries})...</span>`;
      await new Promise(r => setTimeout(r, delay));
    }
  }
  throw new Error('Файл не найден');
}

// ─── СТАРТ ИГРЫ ───────────────────────────────────────────────
function startGame() {
  if (!CONFIG) return;
  applyBackground();
  if (CONFIG.font) {
    const lnk = document.createElement('link');
    lnk.rel  = 'stylesheet';
    lnk.href = `https://fonts.googleapis.com/css2?family=${CONFIG.font.replace(/ /g,'+')}:wght@400;700&display=swap`;
    document.head.appendChild(lnk);
  }
  loadSounds();
  renderCards();

  // Разблокировка звука при первом касании
  document.getElementById('game-wrapper').addEventListener('click', unlockAudio, { once: true });

  initCanvas();
  renderCanvasLoop();
  const pairSet = new Set(CONFIG.items.map(i => i.pairIndex));
  totalPairs = pairSet.size;
  autoScale();

  if (CONFIG.style && CONFIG.style.idle && CONFIG.style.idle.sparksEnabled && CONFIG.style.idle.sparks !== '#000000') {
    setInterval(() => {
      document.querySelectorAll('.card:not(.matched)').forEach(c => {
        if (CONFIG.style.idle.target !== 'both' && CONFIG.style.idle.target !== c.dataset.side) return;
        if (Math.random() > 0.3) return;
        const sp = document.createElement('div');
        sp.style.cssText = 'position:absolute;width:4px;height:4px;border-radius:50%;pointer-events:none;z-index:10;';
        sp.style.background = CONFIG.style.idle.sparks;
        sp.style.boxShadow  = `0 0 6px ${CONFIG.style.idle.sparks}`;
        sp.style.left = (Math.random() * 100) + '%';
        sp.style.top  = (Math.random() * 100) + '%';
        sp.style.animation = 'sparkleAnim 1.5s ease-out forwards';
        c.appendChild(sp);
        setTimeout(() => sp.remove(), 1500);
      });
    }, 300);
  }
}

function autoScale() {
  const wrapper = document.getElementById("game-wrapper");
  if (!wrapper) return;
  const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
  wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
  window.gameScale   = scale;
  window.gameOffsetX = (window.innerWidth  - 1280 * scale) / 2;
  window.gameOffsetY = (window.innerHeight - 720  * scale) / 2;
}
window.addEventListener("resize", autoScale);

function applyBackground() {
  const bg = document.getElementById('bg-layer');
  if (CONFIG.bg) bg.style.backgroundImage = `url(${CONFIG.bg})`;
}

// ─── КАРТОЧКИ ─────────────────────────────────────────────────
function renderCards() {
  const layer = document.getElementById('layer');
  layer.innerHTML = '';
  const st   = CONFIG.style || {};
  const font = CONFIG.font  || 'sans-serif';

  CONFIG.items.forEach(item => {
    const side = item.side === 'left' ? st.left : st.right;
    if (!side) return;
    const card = document.createElement('div');
    card.className         = 'card';
    card.dataset.id        = item.id;
    card.dataset.pairIndex = item.pairIndex;
    card.dataset.side      = item.side;
    card.style.left        = item.x + 'px';
    card.style.top         = item.y + 'px';
    card.style.width       = item.w + 'px';
    card.style.height      = item.h + 'px';
    card.style.transform   = `rotate(${item.rot || 0}deg)`;

    if (st.idle && st.idle.anim && st.idle.anim !== 'none') {
      if (st.idle.target === 'both' || st.idle.target === item.side) {
        card.classList.add('idle-' + st.idle.anim);
        card.style.animationDelay = -(Math.random() * 5).toFixed(2) + 's';
      }
    }

    const isEmpty = !item.text && !item.img;
    const hasImg  = !!(item.img || isImageUrl(item.text));

    if (isEmpty) {
      card.style.background = 'transparent';
      card.style.border     = 'none';
      card.style.boxShadow  = 'none';
      const dot = document.createElement('div');
      const dotStyle = (st.dot && st.dot.style) ? st.dot.style : 'circle';
      dot.className = 'dot-marker dot-' + dotStyle;
      dot.style.setProperty('--d-color', (st.dot && st.dot.color) ? st.dot.color : '#00ffcc');
      dot.style.setProperty('--d-size', ((st.dot && st.dot.size) ? st.dot.size : 30) + 'px');
      if (dotStyle === 'star') dot.textContent = '⭐';
      card.appendChild(dot);
    } else {
      card.style.background = hexToRgba(side.bgColor, side.bgOpacity);
      card.style.border     = `${side.borderWidth || 0}px solid ${side.borderColor}`;
      card.style.color      = side.textColor;
      card.style.fontSize   = (item.fontSize || 18) + 'px';
      card.style.fontFamily = `"${font}", sans-serif`;
      card.style.fontWeight = '700';

      if (st.idle && st.idle.glowEnabled && st.idle.glow !== '#000000') {
        if (st.idle.target === 'both' || st.idle.target === item.side) {
          if (hasImg) {
            card.classList.add('card-has-img', 'glow-idle');
            card.style.setProperty('--idle-glow', st.idle.glow);
          } else {
            card.style.boxShadow = `0 0 15px ${st.idle.glow}`;
          }
        }
      }

      if (item.img) {
        const img = document.createElement('img');
        img.src = item.img;
        img.style.cssText = 'width:100%;height:100%;object-fit:contain;pointer-events:none;';
        card.appendChild(img);
      } else if (isImageUrl(item.text)) {
        const img = document.createElement('img');
        img.src = cleanUrl(item.text);
        img.style.cssText = 'width:100%;height:100%;object-fit:contain;pointer-events:none;';
        card.appendChild(img);
      } else if (/\$|\\\(/.test(item.text)) {
        renderMath(card, item.text);
      } else {
        card.textContent = item.text;
      }
    }

    const animHover = st.animHover || 'none';
    const glowColor = st.glowColor || '#00ffcc';

    if (item.tooltip && (item.tooltip.text || item.tooltip.img)) {
      card.dataset.ttText = item.tooltip.text || '';
      card.dataset.ttImg  = item.tooltip.img  || '';
    }

    card.addEventListener('mouseenter', e => {
      if (card.classList.contains('matched')) return;
      if (selectedCard !== card) applyAnim(card, animHover, glowColor);
      if (item.tooltip && (item.tooltip.text || item.tooltip.img)) showTT(e, card);
    });
    card.addEventListener('mousemove',  e => moveTT(e));
    card.addEventListener('mouseleave', () => {
      if (!card.classList.contains('matched') && selectedCard !== card) clearAnim(card, item.side);
      hideTT();
    });
    card.addEventListener('click', e => { e.stopPropagation(); onCardClick(card); });
    layer.appendChild(card);
  });

  document.addEventListener('click', () => {
    if (selectedCard) {
      selectedCard.classList.remove('selected');
      selectedCard.className = selectedCard.className.replace(/anim-sel-\w+/g, '').trim();
      clearAnim(selectedCard, selectedCard.dataset.side);
      selectedCard = null;
    }
  });
}

function applyAnim(card, anim, glowColor) {
  if (selectedCard === card) return;
  card.classList.remove('glow-idle');
  card.style.removeProperty('animation');
  void card.offsetWidth;
    const dot = card.querySelector('.dot-marker');
  switch (anim) {
    case 'glow':
      if (dot) {
        dot.style.boxShadow = `0 0 8px ${glowColor}, 0 0 20px ${glowColor}`;
        if (dot.classList.contains('dot-star')) dot.style.textShadow = `0 0 20px ${glowColor}, 0 0 40px ${glowColor}`;
      } else {
        card.style.filter = `drop-shadow(0 0 8px ${glowColor}) drop-shadow(0 0 20px ${glowColor})`;
      }
      break;
    case 'scaleUp':   if (dot) dot.style.animation = 'scaleUp 0.4s ease infinite';   else card.style.animation = 'scaleUp 0.4s ease infinite';   break;
    case 'scaleDown': if (dot) dot.style.animation = 'scaleDown 0.4s ease infinite';  else card.style.animation = 'scaleDown 0.4s ease infinite';  break;
    case 'pulse':     if (dot) dot.style.animation = 'pulse 0.6s ease infinite';      else card.style.animation = 'pulse 0.6s ease infinite';      break;
    case 'wobble':    if (dot) dot.style.animation = 'wobble 0.5s ease infinite';     else card.style.animation = 'wobble 0.5s ease infinite';     break;
    case 'glitch':    if (dot) dot.style.animation = 'glitch 0.4s steps(1) infinite'; else card.classList.add('glitch-anim'); break;
    case 'distort':   if (dot) dot.style.animation = 'distort 0.5s ease infinite';   else card.style.animation = 'distort 0.5s ease infinite';   break;
  }
}

function clearAnim(card, side) {
  const st = CONFIG.style || {};
  card.classList.remove('glitch-anim');
  card.style.animation = '';
  card.style.filter    = '';
  card.style.boxShadow = '';

  if (st.idle && st.idle.anim && st.idle.anim !== 'none') {
    if (st.idle.target === 'both' || st.idle.target === side) {
      card.classList.add('idle-' + st.idle.anim);
    }
  }

  if (st.idle && st.idle.glowEnabled && st.idle.glow !== '#000000') {
    if (st.idle.target === 'both' || st.idle.target === side) {
      const hasImg = card.querySelector('img');
      if (hasImg) {
        card.classList.add('glow-idle');
        card.style.setProperty('--idle-glow', st.idle.glow);
      } else if (!card.querySelector('.dot-marker')) {
        card.style.boxShadow = `0 0 15px ${st.idle.glow}`;
      }
    }
  }

  const dot = card.querySelector('.dot-marker');
  if (dot) { dot.style.animation = ''; dot.style.boxShadow = ''; dot.style.textShadow = ''; }
}

function onCardClick(card) {
  if (card.classList.contains('matched')) return;
  const st        = CONFIG.style || {};
  const selAnim   = st.animClick || 'none';
  const glowColor = st.glowColor || '#00ffcc';

  if (selectedCard === card) {
    card.classList.remove('selected');
    card.className = card.className.replace(/anim-sel-\w+/g, '').trim();
    clearAnim(card, card.dataset.side);
    selectedCard = null;
    return;
  }

  card.classList.remove('glitch-anim', 'idle-float', 'idle-pulse', 'idle-heartbeat', 'glow-idle');
  card.style.animation = '';
  card.style.filter    = '';
  card.style.boxShadow = '';
  const dot = card.querySelector('.dot-marker');
  if (dot) { dot.style.animation = ''; dot.style.boxShadow = ''; dot.style.textShadow = ''; }

  if (selectedCard) {
    const first  = selectedCard;
    const second = card;

    if (first.dataset.side === second.dataset.side) {
      first.classList.remove('selected');
      first.className = first.className.replace(/anim-sel-\w+/g, '').trim();
      clearAnim(first, first.dataset.side);
      card.classList.add('selected');
      card.style.setProperty('--glow', glowColor);
      if (selAnim !== 'none') card.classList.add('anim-sel-' + selAnim);
      selectedCard = card;
      return;
    }

    card.classList.add('selected');
    card.style.setProperty('--glow', glowColor);
    if (selAnim !== 'none') card.classList.add('anim-sel-' + selAnim);
    selectedCard = null;
    const sameIndex = first.dataset.pairIndex === second.dataset.pairIndex;
    if (sameIndex) { onMatch(first, second); } else { onMismatch(first, second); }
    return;
  }

  card.classList.add('selected');
  card.style.setProperty('--glow', glowColor);
  if (selAnim !== 'none') card.classList.add('anim-sel-' + selAnim);
  selectedCard = card;
}

function onMatch(a, b) {
  playSound('correct');
  const st             = CONFIG.style || {};
  const matchedOpacity = st.matchedOpacity !== undefined ? parseFloat(st.matchedOpacity) : 0.35;
  const glowColor      = st.glowColor || '#00ffcc';
  createMatchFx(a, b, st.effMatch || 'fireworks');
  const lineSt = st.line || {};
  if (lineSt.enabled !== false) {
    activeLines.push({
      el1: a, el2: b,
      color:     lineSt.color     || '#00ffcc',
      thickness: lineSt.thickness || 4,
      style:     lineSt.style     || 'neon',
      emoji:     lineSt.emoji     || '⭐'
    });
  }
  [a, b].forEach(card => {
    card.classList.remove('selected');
    card.className = card.className.replace(/anim-sel-\w+/g, '').trim();
    card.classList.add('matched');
    clearAnim(card, card.dataset.side);
    const op = parseFloat(matchedOpacity);
    if (op === 0) {
      card.style.opacity       = '0';
      card.style.pointerEvents = 'none';
    } else {
      card.style.opacity = op;
      if (op >= 0.55 && op < 0.9) {
        card.style.filter = `brightness(0.5) drop-shadow(0 0 10px ${glowColor})`;
      } else {
        card.style.filter = `drop-shadow(0 0 10px ${glowColor})`;
      }
    }
  });
  matchedPairs++;
  if (matchedPairs >= totalPairs) setTimeout(showFeedback, 1000);
}

function onMismatch(a, b) {
  playSound('wrong');
  const st = CONFIG.style || {};
  createMismatchFx(st.effMismatch || 'shake', st.effMismatchEmoji);
  [a, b].forEach(card => {
    card.className = card.className.replace(/anim-sel-\w+/g, '').trim();
    const dot = card.querySelector('.dot-marker');
    if (dot) {
      dot.style.animation = 'wobble 0.4s ease';
      setTimeout(() => { dot.style.animation = ''; card.classList.remove('selected'); clearAnim(card, card.dataset.side); }, 420);
    } else {
      card.style.animation = 'wobble 0.4s ease';
      setTimeout(() => { card.style.animation = ''; card.classList.remove('selected'); clearAnim(card, card.dataset.side); }, 420);
    }
  });
}

function createMatchFx(a, b, fxType) {
  if (fxType === 'none') return;
  const ra = a.getBoundingClientRect();
  const rb = b.getBoundingClientRect();
  const centers = [
    {x: ra.left + ra.width/2,  y: ra.top + ra.height/2},
    {x: rb.left + rb.width/2,  y: rb.top + rb.height/2}
  ];
  centers.forEach(c => {
    const count    = fxType==='fireworks'?20 : fxType==='confetti'?15 : fxType==='stars'?12 : 10;
    const emojiStr = fxType==='emoji-burst'?'🤩,🔥,🎉' : fxType==='hearts'?'💖,💕,💓' : fxType==='stars'?'⭐,✨,🌟' : '🎇,🧨,✨';
    const emojis   = emojiStr.split(',');
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'fx-particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      const angle = Math.random() * Math.PI * 2;
      const dist  = 60 + Math.random() * 120;
      p.style.setProperty('--dx',  Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy',  Math.sin(angle) * dist + 'px');
      p.style.setProperty('--rot', (Math.random() * 360 - 180) + 'deg');
      p.style.setProperty('--dur', (0.6 + Math.random() * 0.6) + 's');
      p.style.setProperty('--s',   0.5 + Math.random());
      p.style.left = c.x + 'px';
      p.style.top  = c.y + 'px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1200);
    }
  });
}

function createMismatchFx(fxType, emojiVal) {
  if (fxType === 'shake' || fxType === 'none') return;
  if (fxType === 'lightning') {
    const f = document.getElementById('flash-overlay');
    f.style.animation = 'flashFx 0.5s ease-out';
    setTimeout(() => f.style.animation = '', 500);
    return;
  }
  const isRain = fxType === 'rain';
  const count  = isRain ? 80 : 25;
  const e      = emojiVal || '💩';
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    if (isRain) {
      p.className = 'fx-rain';
      p.style.left              = (Math.random() * window.innerWidth) + 'px';
      p.style.top               = (Math.random() * -200) + 'px';
      p.style.animationDuration = (0.4 + Math.random() * 0.3) + 's';
      p.style.animationDelay    = (Math.random() * 0.3) + 's';
    } else {
      p.className   = 'fx-particle';
      p.textContent = e;
      p.style.left  = (Math.random() * window.innerWidth) + 'px';
      p.style.top   = '-50px';
      p.style.setProperty('--dx',  (Math.random() * 150 - 75) + 'px');
      p.style.setProperty('--dy',  (window.innerHeight + 100) + 'px');
      p.style.setProperty('--rot', (Math.random() * 360) + 'deg');
      p.style.setProperty('--dur', (1.5 + Math.random()) + 's');
      p.style.setProperty('--s',   0.8 + Math.random() * 0.5);
    }
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3000);
  }
}

// ─── CANVAS / ЛИНИИ ───────────────────────────────────────────
let canvas, ctx;
let mouseX = -1000, mouseY = -1000;
window.addEventListener('mousemove', e => {
  if (window.gameScale) {
    mouseX = (e.clientX - window.gameOffsetX) / window.gameScale;
    mouseY = (e.clientY - window.gameOffsetY) / window.gameScale;
  } else { mouseX = e.clientX; mouseY = e.clientY; }
});

function initCanvas() {
  canvas = document.getElementById('canvas-layer');
  ctx    = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

function renderCanvasLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (window.gameScale) { ctx.save(); ctx.translate(window.gameOffsetX, window.gameOffsetY); ctx.scale(window.gameScale, window.gameScale); }
  const time  = performance.now() * 0.001;
  const rectW = document.getElementById("game-wrapper").getBoundingClientRect();
  const scale = window.gameScale || 1;
  activeLines.forEach(line => {
    const ra  = line.el1.getBoundingClientRect();
    const rb  = line.el2.getBoundingClientRect();
    const rx1 = (ra.left - rectW.left) / scale, ry1 = (ra.top - rectW.top) / scale;
    const rw1 = ra.width / scale,                rh1 = ra.height / scale;
    const rx2 = (rb.left - rectW.left) / scale, ry2 = (rb.top - rectW.top) / scale;
    const rw2 = rb.width / scale,                rh2 = rb.height / scale;
    const isDot1  = !!line.el1.querySelector('.dot-marker');
    const isDot2  = !!line.el2.querySelector('.dot-marker');
    const center1 = {x: rx1 + rw1/2, y: ry1 + rh1/2};
    const center2 = {x: rx2 + rw2/2, y: ry2 + rh2/2};
    let pA, pB;
    if (isDot1) { pA = center1; } else {
      const pts1 = [{x:rx1+rw1/2,y:ry1},{x:rx1+rw1/2,y:ry1+rh1},{x:rx1,y:ry1+rh1/2},{x:rx1+rw1,y:ry1+rh1/2}];
      pA = pts1.reduce((best, p) => {
        const target = isDot2 ? center2 : {x:rx2+rw2/2,y:ry2+rh2/2};
        return Math.hypot(p.x-target.x,p.y-target.y) < Math.hypot(best.x-target.x,best.y-target.y) ? p : best;
      });
    }
    if (isDot2) { pB = center2; } else {
      const pts2 = [{x:rx2+rw2/2,y:ry2},{x:rx2+rw2/2,y:ry2+rh2},{x:rx2,y:ry2+rh2/2},{x:rx2+rw2,y:ry2+rh2/2}];
      pB = pts2.reduce((best, p) => Math.hypot(p.x-pA.x,p.y-pA.y) < Math.hypot(best.x-pA.x,best.y-pA.y) ? p : best);
    }
    line.x1 = pA.x; line.y1 = pA.y; line.x2 = pB.x; line.y2 = pB.y;
    drawComplexLine(line, time);
  });
  if (window.gameScale) ctx.restore();
  requestAnimationFrame(renderCanvasLoop);
}

function drawComplexLine(L, time) {
  const {x1,y1,x2,y2,color,thickness,style,emoji} = L;
  const mx = (x1+x2)/2;
  let cx1=mx, cy1=y1, cx2=mx, cy2=y2;
  if (style === 'rope') { cy1 += Math.sin(time*3)*20; cy2 += Math.cos(time*3)*20; }
  else if (style !== 'circuit' && style !== 'arrow') {
    const distToMouse = Math.hypot(mx-mouseX, (y1+y2)/2-mouseY);
    if (distToMouse < 150) { const rep=(150-distToMouse)*0.3; cx1+=rep*(mx>mouseX?1:-1); cy1+=rep*((y1+y2)/2>mouseY?1:-1); cx2=cx1; cy2=cy1; }
  }
  ctx.save();
  ctx.strokeStyle=color; ctx.lineWidth=thickness; ctx.lineCap='round'; ctx.lineJoin='round';
  if (style === 'circuit') {
    ctx.shadowColor=color; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.moveTo(x1,y1);
    const midX=x1+(x2-x1)*0.5;
    ctx.lineTo(midX,y1); ctx.lineTo(midX,y2); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(x1,y1,thickness*1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(midX,y1,thickness,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(midX,y2,thickness,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x2,y2,thickness*1.5,0,Math.PI*2); ctx.fill();
  } else if (style === 'dashed' || style === 'dotted') {
    ctx.shadowColor=color; ctx.shadowBlur=8;
    if (style==='dotted') { ctx.setLineDash([thickness,thickness*2]); ctx.lineCap='round'; }
    else { ctx.setLineDash([thickness*3,thickness*3]); }
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1,cy1,cx2,cy2,x2,y2); ctx.stroke();
  } else if (style === 'gradient') {
    const grad=ctx.createLinearGradient(x1,y1,x2,y2);
    grad.addColorStop(0,color); grad.addColorStop(0.5,'#fff'); grad.addColorStop(1,color);
    ctx.strokeStyle=grad; ctx.shadowColor='#fff'; ctx.shadowBlur=15;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1,cy1,cx2,cy2,x2,y2); ctx.stroke();
  } else if (style==='emoji'||style==='magic'||style==='nature'||style==='sparkle') {
    ctx.strokeStyle=color+'44'; ctx.lineWidth=thickness*0.5;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1,cy1,cx2,cy2,x2,y2); ctx.stroke();
    const e=style==='magic'?'⭐':style==='nature'?'🦋':style==='sparkle'?'✨':emoji;
    const steps=style==='sparkle'?12:8;
    for (let i=0;i<=steps;i++) {
      const t=i/steps;
      const bx=Math.pow(1-t,3)*x1+3*Math.pow(1-t,2)*t*cx1+3*(1-t)*t*t*cx2+Math.pow(t,3)*x2;
      const by=Math.pow(1-t,3)*y1+3*Math.pow(1-t,2)*t*cy1+3*(1-t)*t*t*cy2+Math.pow(t,3)*y2;
      if (style==='sparkle') {
        const pulse=Math.abs(Math.sin(time*5+i));
        ctx.fillStyle=`rgba(255,255,255,${pulse})`; ctx.shadowColor=color; ctx.shadowBlur=15;
        ctx.beginPath(); ctx.arc(bx,by,thickness*(1+pulse),0,Math.PI*2); ctx.fill();
      } else {
        ctx.font=`${thickness*3+10}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.shadowColor=color; ctx.shadowBlur=10;
        ctx.fillText(e,bx,by+Math.sin(time*2+i)*5);
      }
    }
  } else if (style === 'arrow') {
    ctx.shadowColor=color; ctx.shadowBlur=15; ctx.strokeStyle=color+'88'; ctx.lineWidth=thickness*2;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1,cy1,cx2,cy2,x2,y2); ctx.stroke();
    ctx.strokeStyle=color; ctx.lineWidth=thickness;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1,cy1,cx2,cy2,x2,y2); ctx.stroke();
    const tS=0.05,tE=0.95;
    const px1=Math.pow(1-tS,3)*x1+3*Math.pow(1-tS,2)*tS*cx1+3*(1-tS)*tS*tS*cx2+Math.pow(tS,3)*x2;
    const py1=Math.pow(1-tS,3)*y1+3*Math.pow(1-tS,2)*tS*cy1+3*(1-tS)*tS*tS*cy2+Math.pow(tS,3)*y2;
    const px2=Math.pow(1-tE,3)*x1+3*Math.pow(1-tE,2)*tE*cx1+3*(1-tE)*tE*tE*cx2+Math.pow(tE,3)*x2;
    const py2=Math.pow(1-tE,3)*y1+3*Math.pow(1-tE,2)*tE*cy1+3*(1-tE)*tE*tE*cy2+Math.pow(tE,3)*y2;
    ctx.fillStyle=color;
    ctx.save(); ctx.translate(x1,y1); ctx.rotate(Math.atan2(y1-py1,x1-px1));
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-thickness*4,thickness*2); ctx.lineTo(-thickness*4,-thickness*2); ctx.closePath(); ctx.fill(); ctx.restore();
    ctx.save(); ctx.translate(x2,y2); ctx.rotate(Math.atan2(y2-py2,x2-px2));
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-thickness*4,thickness*2); ctx.lineTo(-thickness*4,-thickness*2); ctx.closePath(); ctx.fill(); ctx.restore();
  } else {
    ctx.shadowColor=color; ctx.shadowBlur=18; ctx.strokeStyle=color+'55'; ctx.lineWidth=thickness*3;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1,cy1,cx2,cy2,x2,y2); ctx.stroke();
    ctx.strokeStyle=color; ctx.lineWidth=thickness; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1,cy1,cx2,cy2,x2,y2); ctx.stroke();
  }
  ctx.restore();
}

// ─── ТУЛТИП ───────────────────────────────────────────────────
function showTT(e, card) {
  const st = CONFIG.style || {};
  const tt = st.tooltip || {};
  const txt    = card.dataset.ttText || '';
  const imgStr = card.dataset.ttImg  || '';
  if (!txt && !imgStr) return;
  const tooltipBox = document.getElementById('tooltip-box');
  tooltipBox.innerHTML = '';
  tooltipBox.style.background   = tt.bg     || '#222';
  tooltipBox.style.color        = tt.color  || '#00ffcc';
  tooltipBox.style.borderRadius = (tt.radius || 8) + 'px';
  tooltipBox.style.boxShadow    = `0 0 16px ${tt.glow || '#00ffcc'}`;
  tooltipBox.style.border       = `1px solid ${tt.glow || '#00ffcc'}55`;
  if (txt) {
    const d = document.createElement('div');
    if (isImageUrl(txt)) { d.innerHTML = '<img src="'+cleanUrl(txt)+'" style="max-width:100%;max-height:200px;object-fit:contain;border-radius:6px;display:block;margin:0 auto;">'; }
    else if (/\$|\\\(/.test(txt)) { renderMath(d, txt); }
    else { d.textContent = txt; }
    tooltipBox.appendChild(d);
  }
  if (imgStr) {
    const i = document.createElement('img'); i.src = imgStr;
    i.style.cssText = 'max-width:100%;max-height:200px;object-fit:contain;border-radius:6px;display:block;margin:6px auto 0;';
    tooltipBox.appendChild(i);
  }
  tooltipBox.style.display = 'block';
  moveTT(e);
}
function moveTT(e) {
  const tooltipBox = document.getElementById('tooltip-box');
  if (tooltipBox.style.display === 'none') return;
  const scale = window.gameScale || 1;
  const rect  = document.getElementById('game-wrapper').getBoundingClientRect();
  let x = ((e.clientX - rect.left) / scale + 15);
  let y = ((e.clientY - rect.top)  / scale + 15);
  const ttWidth = tooltipBox.offsetWidth;
  if (x + ttWidth > 1280) x = ((e.clientX - rect.left) / scale - ttWidth - 15);
  tooltipBox.style.left = x + 'px';
  tooltipBox.style.top  = y + 'px';
}
function hideTT() { document.getElementById('tooltip-box').style.display = 'none'; }

  const anim    = fb.anim || 'popUp';
  const animStr = anim !== 'none' ? `${anim} 0.55s cubic-bezier(0.34,1.56,0.64,1) both` : 'none';

 if (fb.blur > 0) {
  document.getElementById('scene').style.transition = 'filter 0.5s ease';
  document.getElementById('scene').style.filter = `blur(${fb.blur}px)`;
}

dimOv.style.cssText = `

  background: rgba(0,0,0,0.45);
  z-index: 54999;
  pointer-events: none;

`;
document.body.appendChild(dimOv);
  // ── КАРТИНКА ───────────────────────────────────────────────
  const showImg = (fb.mode === 'both' || fb.mode === 'image') && fb.img;
  const showTxt = (fb.mode === 'both' || fb.mode === 'text');

  if (showImg) {
    const sc = window.gameScale || 1;
    const ox = window.gameOffsetX || 0;
    const oy = window.gameOffsetY || 0;
    imgBox.style.left      = (ox + (fb.imgX || 480) * sc) + 'px';
    imgBox.style.top       = (oy + (fb.imgY || 100) * sc) + 'px';
    imgBox.style.width     = ((fb.imgW || 320) * sc) + 'px';
    imgBox.style.height    = ((fb.imgH || 240) * sc) + 'px';
    imgEl.src              = fb.img;
    imgBox.style.display   = 'block';
    imgBox.style.animation = animStr;
    if (fb.imgGlow) imgBox.style.filter = `drop-shadow(0 0 20px ${fb.glowColor || '#00ffcc'})`;
  } else {
    imgBox.style.display = 'none';
  }

  // ── ТЕКСТ ──────────────────────────────────────────────────
  if (showTxt) {
    const sc = window.gameScale || 1;
    const ox = window.gameOffsetX || 0;
    const oy = window.gameOffsetY || 0;
    txtBox.style.left         = (ox + (fb.txtX || 440) * sc) + 'px';
    txtBox.style.top          = (oy + (fb.txtY || 400) * sc) + 'px';
    txtBox.style.width        = ((fb.txtW || 400) * sc) + 'px';
    txtBox.style.height       = ((fb.txtH || 150) * sc) + 'px';
    txtBox.style.background   = fb.transparentBg ? 'transparent' : (fb.bgColor || '#0a0a0f');
    txtBox.style.border       = fb.transparentBg ? 'none' : `${fb.borderWidth || 0}px solid ${fb.borderColor || '#00ffcc'}`;
    txtBox.style.borderRadius = (fb.radius || 16) + 'px';
    txtBox.style.boxShadow    = fb.transparentBg ? 'none' : `0 0 30px ${fb.glowColor || '#00ffcc'}, 10px 10px 20px ${fb.shadow || '#000000'}`;
    txtEl.style.textShadow    = fb.fbTextGlow ? `0 0 15px ${fb.glowColor || '#00ffcc'}, 0 0 30px ${fb.glowColor || '#00ffcc'}` : 'none';
    txtEl.style.fontSize      = (fb.fontSize || 28) + 'px';
    txtEl.style.fontFamily    = fb.font ? `"${fb.font}", sans-serif` : (CONFIG.font ? `"${CONFIG.font}", sans-serif` : 'sans-serif');

    let fbTextContent = fb.text || '🎉 Отлично!';
    if (isImageUrl(fbTextContent)) {
      txtEl.innerHTML = `<img src="${cleanUrl(fbTextContent)}" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:${fb.radius || 16}px;">`;
    } else if (/\$|\\\(/.test(fbTextContent)) {
      renderMath(txtEl, fbTextContent);
      txtEl.style.color = fb.textColor || '#fff';
    } else {
      txtEl.textContent = fbTextContent;
      txtEl.style.color = fb.textColor || '#fff';
    }

    txtBox.style.display   = 'flex';
    txtBox.style.animation = animStr;
  } else {
    txtBox.style.display = 'none';
  }

  // ── ИСКРЫ ──────────────────────────────────────────────────
  if (fb.sparks) {
    setInterval(() => {
      [imgBox, txtBox].forEach(b => {
        if (b.style.display === 'none' || b.style.display === '') return;
        if (Math.random() > 0.5) return;
        const sp = document.createElement('div');
        sp.style.cssText = 'position:absolute;width:6px;height:6px;background:#fff;border-radius:50%;box-shadow:0 0 10px #fff;animation:sparkleAnim 1.5s ease-out forwards;pointer-events:none;z-index:9999;';
        sp.style.left = (Math.random() * 100) + '%';
        sp.style.top  = (Math.random() * 100) + '%';
        b.appendChild(sp);
        setTimeout(() => sp.remove(), 1500);
      });
    }, 200);
  }
}
init();
</script>
</body>
</html>
