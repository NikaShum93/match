<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сопоставление Пар</title>
<script>
window.MathJax = {
  tex: { inlineMath: [['$','$'],['\\$','\\$']] },
  startup: { typeset: false }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; }
body, html {
  margin: 0; padding: 0; width: 100%; height: 100%;
  overflow: hidden; background: transparent;
  font-family: sans-serif;
}
#bg-layer {
  position: fixed; inset: 0;
  background-color: #111;
  background-size: cover; background-position: center;
  z-index: 0;
}
#canvas-layer {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 10;
}
#items-layer {
  position: fixed; inset: 0;
  z-index: 20;
}

/* ---- Loader ---- */
#loader-screen {
  position: fixed; inset: 0; background: rgba(20, 20, 25, 0.4); backdrop-filter: blur(4px);
  z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center;
  transition: opacity 0.5s ease;
}
.loader-box {
  background: rgba(10, 10, 15, 0.85); padding: 30px; border-radius: 16px; border: 1px solid rgba(0,255,204,0.3);
  box-shadow: 0 10px 40px rgba(0,0,0,0.8); text-align: center; color: #fff; font-family: 'Segoe UI', sans-serif;
}
.spinner {
  width: 40px; height: 40px; border: 4px solid rgba(0,255,204,0.2); border-top-color: #00ffcc;
  border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Карточка ---- */
.card {
  position: absolute;
  display: flex; justify-content: center; align-items: center;
  text-align: center; cursor: pointer;
  border-radius: 8px; padding: 6px;
  word-break: break-word;
  transition: opacity 0.5s ease, transform 0.15s ease;
  user-select: none;
}
.card.selected { z-index: 100; }
.card.matched { pointer-events: none; cursor: default; }

/* Анимации выбранной карточки */
.anim-sel-float { animation: selFloat 2s ease-in-out infinite; }
.anim-sel-pulse { animation: selPulse 1s ease infinite; }
.anim-sel-shake { animation: selShake 0.5s ease infinite; }
.anim-sel-glow  { filter: drop-shadow(0 0 15px var(--glow,#00ffcc)) brightness(1.2); }

@keyframes selFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
@keyframes selPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
@keyframes selShake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }

/* ---- Tooltip ---- */
#tooltip-box {
  position: fixed; z-index: 9999;
  padding: 10px 14px; border-radius: 8px;
  font-size: 14px; font-weight: bold;
  pointer-events: none; display: none;
  max-width: 260px; text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

/* ---- Фидбек ---- */
#feedback-box {
  position: absolute; z-index: 50000; display: none; flex-direction: column; align-items: center; gap: 16px;
  padding: 30px 36px; border-radius: 16px; box-sizing: border-box; backdrop-filter: blur(6px); text-align: center;
}
#feedback-box.show { display: flex; }
#feedback-img { display: block; border-radius: 12px; max-width: 100%; height: auto; }
#feedback-text { font-weight: 900; line-height: 1.4; word-break: break-word; }

@keyframes popUp { 0% { transform: scale(0.3); opacity: 0; } 70% { transform: scale(1.08); opacity: 1; } 100% { transform: scale(1); } }

/* ---- Анимации hover карточек ---- */
@keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
@keyframes wobble { 0%,100%{transform:rotate(0deg);} 25%{transform:rotate(-6deg);} 75%{transform:rotate(6deg);} }
@keyframes glitch { 0%,100%{clip-path:none;transform:translate(0);} 20%{clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);transform:translate(-4px,2px);} 40%{clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);transform:translate(4px,-2px);} 60%{clip-path:none;transform:translate(2px,4px);} }
@keyframes distort { 0%,100%{transform:skew(0deg,0deg);} 25%{transform:skew(6deg,2deg);} 75%{transform:skew(-6deg,-2deg);} }
@keyframes scaleUp { 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }
@keyframes scaleDown { 0%,100%{transform:scale(1);} 50%{transform:scale(0.88);} }

/* ---- Частицы Эффектов ---- */
.fx-particle {
  position: fixed; pointer-events: none; z-index: 30000; font-size: 24px;
  animation: fxFly var(--dur, 1s) cubic-bezier(0.25,1,0.5,1) forwards;
}
@keyframes fxFly {
  0%   { opacity: 1; transform: translate(0,0) scale(var(--s,1)) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(var(--se,0.5)) rotate(var(--rot,180deg)); }
}

.fx-rain {
  position: fixed; pointer-events: none; z-index: 30000; width: 2px; height: 30px; background: rgba(100,200,255,0.8);
  animation: rainDrop 0.6s linear forwards;
}
@keyframes rainDrop { 0% { transform: translateY(-50px); opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }

#flash-overlay {
  position: fixed; inset: 0; background: #fff; z-index: 40000; opacity: 0; pointer-events: none;
}
@keyframes flashFx { 0% { opacity: 0.8; } 20% { opacity: 0; } 40% { opacity: 0.5; } 100% { opacity: 0; } }
</style>
</head>
<body>

<div id="loader-screen">
  <div class="loader-box">
    <div class="spinner"></div>
    <div id="loader-text" style="font-weight:bold; font-size:16px;">
      Без паники — игра загружается.<br><span style="font-size:12px;color:#aaa;margin-top:8px;display:block;">Минутку, ожидаем данные...</span>
    </div>
  </div>
</div>

<div id="bg-layer"></div>
<canvas id="canvas-layer"></canvas>
<div id="items-layer"></div>
<div id="tooltip-box"></div>
<div id="flash-overlay"></div>

<div id="feedback-box">
  <img id="feedback-img" src="" alt="">
  <div id="feedback-text"></div>
</div>

<script>
/* ============================================================
   КОНСТАНТЫ
   ============================================================ */
const JSON_BASE = "https://nikashum93.github.io/texts/data/";

/* ============================================================
   ЗАГРУЗКА КОНФИГА
   ============================================================ */
let CONFIG = null;
let selectedCard = null;
let matchedPairs = 0;
let totalPairs   = 0;
let sounds       = {};
let activeLines  = []; 

async function init() {
  const params = new URLSearchParams(location.search);
  const id      = params.get('id');
  const preview = params.get('preview');

  if (preview) {
    document.getElementById('loader-screen').style.display = 'none';
    window.parent.postMessage('GAME_READY', '*');
    window.addEventListener('message', e => {
      if (e.data?.type === 'LOAD_CONFIG') {
        CONFIG = e.data.config;
        startGame();
      }
    });
    return;
  }

  if (id) {
    try {
      CONFIG = await fetchWithRetry(`${JSON_BASE}${encodeURIComponent(id)}.json`);
      const loader = document.getElementById('loader-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
      }
      startGame();
    } catch(e) {
      document.getElementById('loader-text').innerHTML = `❌ Ошибка: Сервер GitHub ещё не обновил данные.<br><span style="font-size:12px;color:#ccc;display:block;margin-top:10px;">Обновите страницу через минуту.</span>`;
      document.querySelector('.spinner').style.display = 'none';
    }
    return;
  }

  document.getElementById('loader-screen').style.display = 'none';
}

async function fetchWithRetry(url, retries = 20, delay = 2000) {
  const textEl = document.getElementById('loader-text');
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(url + "?t=" + new Date().getTime());
      if (res.ok) return await res.json();
    } catch(err) {}
    
    if (i < retries - 1) {
      if(i > 1 && textEl) {
        textEl.innerHTML = `Без паники — игра публикуется.<br><span style="font-size:12px;color:#aaa;display:block;margin-top:8px;">Ждём GitHub (Попытка ${i+1} из ${retries})...</span>`;
      }
      await new Promise(r => setTimeout(r, delay));
    }
  }
  throw new Error('Файл не найден');
}

/* ============================================================
   СТАРТ ИГРЫ
   ============================================================ */
function startGame() {
  if (!CONFIG) return;

  applyBackground();
  loadFont();
  loadSounds();
  renderCards();
  initCanvas();
  renderCanvasLoop();

  const pairSet = new Set(CONFIG.items.map(i => i.pairIndex));
  totalPairs = pairSet.size;
}

/* ============================================================
   ФОН
   ============================================================ */
function applyBackground() {
  const bg = document.getElementById('bg-layer');
  if (CONFIG.bg) {
    bg.style.backgroundImage = `url(${CONFIG.bg})`;
  }
}

/* ============================================================
   ШРИФТ
   ============================================================ */
function loadFont() {
  if (!CONFIG.font) return;
  const gfLink = document.createElement('link');
  gfLink.rel  = 'stylesheet';
  gfLink.href = `https://fonts.googleapis.com/css2?family=${CONFIG.font.replace(/ /g,'+')}:wght@400;700&display=swap`;
  document.head.appendChild(gfLink);
}

/* ============================================================
   ЗВУКИ
   ============================================================ */
function loadSounds() {
  const s = CONFIG.sounds || {};
  ['correct','wrong','win'].forEach(key => {
    if (s[key]) {
      const a = new Audio(s[key]);
      a.preload = 'auto';
      sounds[key] = a;
    }
  });
}

function playSound(key) {
  try {
    if (sounds[key]) {
      sounds[key].currentTime = 0;
      sounds[key].play().catch(() => {});
    }
  } catch(_) {}
}

/* ============================================================
   КАРТОЧКИ
   ============================================================ */
function renderCards() {
  const layer = document.getElementById('items-layer');
  layer.innerHTML = '';

  const st    = CONFIG.style || {};
  const font  = CONFIG.font  || 'sans-serif';

  CONFIG.items.forEach(item => {
    const side = item.side === 'left' ? st.left : st.right;
    if (!side) return;

    const card = document.createElement('div');
    card.className  = 'card';
    card.dataset.id         = item.id;
    card.dataset.pairIndex  = item.pairIndex;
    card.dataset.side       = item.side;

    card.style.left      = item.x + 'px';
    card.style.top       = item.y + 'px';
    card.style.width     = item.w + 'px';
    card.style.height    = item.h + 'px';
    card.style.transform = `rotate(${item.rot || 0}deg)`;

    card.style.background  = hexToRgba(side.bgColor, side.bgOpacity);
    card.style.border      = `${side.borderWidth}px solid ${side.borderColor}`;
    card.style.color       = side.textColor;
    card.style.fontSize    = (item.fontSize || 18) + 'px';
    card.style.fontFamily  = `"${font}", sans-serif`;
    card.style.fontWeight  = '700';

    if (item.img) {
      const img = document.createElement('img');
      img.src   = item.img;
      img.style.cssText = 'width:100%;height:100%;object-fit:contain;pointer-events:none;';
      card.appendChild(img);
    } else {
      const needsMath = /\$|\\\(/.test(item.text);
      if (needsMath) {
        card.innerHTML = item.text;
        if (window.MathJax?.typesetPromise) {
          MathJax.typesetPromise([card]).catch(() => {});
        }
      } else {
        card.textContent = item.text;
      }
    }

    const animHover = st.animHover || 'none';
    const glowColor = st.glowColor || '#00ffcc';

    card.addEventListener('mouseenter', () => {
      if (card.classList.contains('matched')) return;
      applyAnim(card, animHover, glowColor);
    });
    
    card.addEventListener('mouseleave', () => {
      if (!card.classList.contains('matched') && selectedCard !== card) {
        clearAnim(card);
      }
    });

    card.addEventListener('click', (e) => { 
      e.stopPropagation(); 
      onCardClick(card); 
    });

    if (item.tooltip && (item.tooltip.text || item.tooltip.img)) {
      card.dataset.ttText = item.tooltip.text || '';
      card.dataset.ttImg  = item.tooltip.img  || '';
      card.addEventListener('mouseenter', e => showTooltip(e, card));
      card.addEventListener('mousemove',  e => moveTooltip(e));
      card.addEventListener('mouseleave', hideTooltip);
    }

    layer.appendChild(card);
  });

  document.addEventListener('click', () => {
    if (selectedCard) {
      selectedCard.classList.remove('selected');
      selectedCard.className = selectedCard.className.replace(/anim-sel-\w+/g, '').trim();
      clearAnim(selectedCard);
      selectedCard = null;
    }
  });
}

/* ============================================================
   АНИМАЦИИ КАРТОЧЕК
   ============================================================ */
function applyAnim(card, anim, glowColor) {
  if (selectedCard === card) return; 
  card.style.removeProperty('animation');
  void card.offsetWidth; 

  switch (anim) {
    case 'glow':
      card.style.filter = `drop-shadow(0 0 8px ${glowColor}) drop-shadow(0 0 20px ${glowColor})`;
      break;
    case 'scaleUp':
      card.style.animation = 'scaleUp 0.4s ease infinite';
      break;
    case 'scaleDown':
      card.style.animation = 'scaleDown 0.4s ease infinite';
      break;
    case 'pulse':
      card.style.animation = 'pulse 0.6s ease infinite';
      break;
    case 'wobble':
      card.style.animation = 'wobble 0.5s ease infinite';
      break;
    case 'glitch':
      card.style.animation = 'glitch 0.4s steps(1) infinite';
      break;
    case 'distort':
      card.style.animation = 'distort 0.5s ease infinite';
      break;
    default:
      break;
  }
}

function clearAnim(card) {
  card.style.animation  = '';
  card.style.boxShadow  = '';
  card.style.filter     = ''; 
}

/* ============================================================
   КЛИК ПО КАРТОЧКЕ
   ============================================================ */
function onCardClick(card) {
  if (card.classList.contains('matched')) return;

  const st        = CONFIG.style || {};
  const selAnim   = st.animSelected || 'glow';
  const glowColor = st.glowColor || '#00ffcc';

  if (selectedCard === card) {
    card.classList.remove('selected');
    card.className = card.className.replace(/anim-sel-\w+/g, '').trim();
    clearAnim(card);
    selectedCard = null;
    return;
  }

  card.classList.add('selected');
  card.style.setProperty('--glow', glowColor);
  if(selAnim !== 'none') card.classList.add('anim-sel-' + selAnim);

  if (!selectedCard) {
    selectedCard = card;
    return;
  }

  const first  = selectedCard;
  const second = card;

  const sameIndex = first.dataset.pairIndex === second.dataset.pairIndex;
  const sameSide  = first.dataset.side      === second.dataset.side;

  if (sameIndex && !sameSide) {
    onMatch(first, second);
  } else {
    onMismatch(first, second);
  }

  selectedCard = null;
}

/* ============================================================
   ВЕРНАЯ ПАРА
   ============================================================ */
function onMatch(a, b) {
  playSound('correct');

  const st             = CONFIG.style || {};
  const matchedOpacity = st.matchedOpacity !== undefined ? st.matchedOpacity : 0.35;
  const glowColor      = st.glowColor || '#00ffcc';

  createMatchFx(a, b, st.effMatch || 'fireworks');

  const ra = a.getBoundingClientRect();
  const rb = b.getBoundingClientRect();
  const ax = a.dataset.side === 'left' ? ra.right  : ra.left;
  const ay = ra.top + ra.height / 2;
  const bx = b.dataset.side === 'left' ? rb.right  : rb.left;
  const by = rb.top + rb.height / 2;

  const lineSt = st.line || {};
  activeLines.push({
    x1: ax, y1: ay,
    x2: bx, y2: by,
    color: lineSt.color || '#00ffcc',
    thickness: lineSt.thickness || 4,
    style: lineSt.style || 'neon',
    emoji: lineSt.emoji || '⭐'
  });

  [a, b].forEach(card => {
    card.classList.remove('selected');
    card.className = card.className.replace(/anim-sel-\w+/g, '').trim();
    card.classList.add('matched');
    clearAnim(card);
    card.style.opacity   = matchedOpacity;
    card.style.filter = `drop-shadow(0 0 10px ${glowColor})`;
  });

  matchedPairs++;
  if (matchedPairs >= totalPairs) {
    setTimeout(showFeedback, 600);
  }
}

/* ============================================================
   ОШИБКА
   ============================================================ */
function onMismatch(a, b) {
  playSound('wrong');
  const st = CONFIG.style || {};
  
  createMismatchFx(st.effMismatch || 'shake');

  [a, b].forEach(card => {
    card.className = card.className.replace(/anim-sel-\w+/g, '').trim();
    card.style.animation = 'wobble 0.4s ease';
    setTimeout(() => {
      card.style.animation = '';
      card.classList.remove('selected');
      clearAnim(card);
    }, 420);
  });
}

function createMatchFx(a, b, fxType) {
  if(fxType === 'none') return;
  const ra = a.getBoundingClientRect(); const rb = b.getBoundingClientRect();
  const centers = [{x: ra.left+ra.width/2, y: ra.top+ra.height/2}, {x: rb.left+rb.width/2, y: rb.top+rb.height/2}];
  centers.forEach(c => {
    const count = fxType==='fireworks'?20 : fxType==='confetti'?15 : fxType==='stars'?12 : 10;
    const emojiStr = fxType==='emoji-burst'?'🤩,🔥,🎉' : fxType==='hearts'?'💖,💕,💓' : fxType==='stars'?'⭐,✨,🌟' : '🎇,🧨,✨';
    const emojis = emojiStr.split(',');
    for(let i=0; i<count; i++) {
      const p = document.createElement('div'); p.className = 'fx-particle';
      p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      const angle = Math.random() * Math.PI * 2; const dist = 60 + Math.random() * 120;
      p.style.setProperty('--dx', Math.cos(angle)*dist + 'px'); p.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
      p.style.setProperty('--rot', (Math.random()*360 - 180) + 'deg'); p.style.setProperty('--dur', (0.6 + Math.random()*0.6) + 's');
      p.style.setProperty('--s', 0.5 + Math.random());
      p.style.left = c.x + 'px'; p.style.top = c.y + 'px';
      document.body.appendChild(p); setTimeout(()=>p.remove(), 1200);
    }
  });
}

function createMismatchFx(fxType) {
  if(fxType === 'shake' || fxType === 'none') return;
  if(fxType === 'lightning') {
    const f = document.getElementById('flash-overlay'); f.style.animation = 'flashFx 0.5s ease-out';
    setTimeout(()=>f.style.animation='', 500); return;
  }
  const isRain = fxType === 'rain'; const count = isRain ? 40 : 15;
  const emojis = fxType === 'emoji-drop' ? ['🤡','💩','👎','💔','🤦'] : fxType === 'shatter' ? ['🔴','🔺','🔻'] : ['💧'];
  for(let i=0; i<count; i++) {
    const p = document.createElement('div');
    if(isRain) p.className = 'fx-rain'; else { p.className = 'fx-particle'; p.textContent = emojis[Math.floor(Math.random()*emojis.length)]; }
    p.style.left = Math.random() * window.innerWidth + 'px';
    if(!isRain) {
      p.style.top = '-50px'; p.style.setProperty('--dx', (Math.random()*100 - 50) + 'px');
      p.style.setProperty('--dy', (window.innerHeight + 100) + 'px');
      p.style.setProperty('--rot', (Math.random()*360) + 'deg');
      p.style.setProperty('--dur', (1 + Math.random()) + 's'); p.style.setProperty('--s', 0.8 + Math.random()*0.5);
    }
    document.body.appendChild(p); setTimeout(()=>p.remove(), 2000);
  }
}

/* ============================================================
   CANVAS — ЛИНИИ
   ============================================================ */
let canvas, ctx;
let mouseX = -1000, mouseY = -1000;
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

function initCanvas() {
  canvas = document.getElementById('canvas-layer');
  ctx    = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

function renderCanvasLoop() {
  ctx.clearRect(0,0, canvas.width, canvas.height);
  const time = performance.now() * 0.001;
  activeLines.forEach(line => drawComplexLine(line, time));
  requestAnimationFrame(renderCanvasLoop);
}

function drawComplexLine(L, time) {
  const {x1, y1, x2, y2, color, thickness, style, emoji} = L;
  const mx = (x1+x2)/2;
  let cx1 = mx, cy1 = y1, cx2 = mx, cy2 = y2;
  
  if (style === 'rope') {
    cy1 += Math.sin(time*3)*20; cy2 += Math.cos(time*3)*20;
  } else if(style !== 'circuit' && style !== 'arrow') {
    const distToMouse = Math.hypot(mx - mouseX, (y1+y2)/2 - mouseY);
    if(distToMouse < 150) {
      const rep = (150 - distToMouse) * 0.3;
      cx1 += rep * (mx > mouseX ? 1 : -1); cy1 += rep * ((y1+y2)/2 > mouseY ? 1 : -1);
      cx2 = cx1; cy2 = cy1;
    }
  }

  ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = thickness; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  if (style === 'circuit') {
    ctx.shadowColor = color; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.moveTo(x1, y1); const midX = x1 + (x2-x1)*0.5;
    ctx.lineTo(midX, y1); ctx.lineTo(midX, y2); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x1,y1, thickness*1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(midX,y1, thickness, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(midX,y2, thickness, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x2,y2, thickness*1.5, 0, Math.PI*2); ctx.fill();
  } 
  else if (style === 'dashed' || style === 'dotted') {
    ctx.shadowColor = color; ctx.shadowBlur = 8;
    if(style === 'dotted') { ctx.setLineDash([thickness, thickness*2]); ctx.lineCap = 'round'; } else { ctx.setLineDash([thickness*3, thickness*3]); }
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1, cy1, cx2, cy2, x2, y2); ctx.stroke();
  }
  else if (style === 'gradient') {
    const grad = ctx.createLinearGradient(x1,y1,x2,y2);
    grad.addColorStop(0, color); grad.addColorStop(0.5, '#fff'); grad.addColorStop(1, color);
    ctx.strokeStyle = grad; ctx.shadowColor = '#fff'; ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1, cy1, cx2, cy2, x2, y2); ctx.stroke();
  }
  else if (style === 'emoji' || style === 'magic' || style === 'nature' || style === 'sparkle') {
    ctx.strokeStyle = color + '44'; ctx.lineWidth = thickness*0.5;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1, cy1, cx2, cy2, x2, y2); ctx.stroke();
    const e = style==='magic'?'⭐': style==='nature'?'🦋': style==='sparkle'?'✨': emoji;
    const steps = style==='sparkle' ? 12 : 8;
    for(let i=0; i<=steps; i++) {
      const t = i/steps;
      const bx = Math.pow(1-t,3)*x1 + 3*Math.pow(1-t,2)*t*cx1 + 3*(1-t)*t*t*cx2 + Math.pow(t,3)*x2;
      const by = Math.pow(1-t,3)*y1 + 3*Math.pow(1-t,2)*t*cy1 + 3*(1-t)*t*t*cy2 + Math.pow(t,3)*y2;
      if(style === 'sparkle') {
        const pulse = Math.abs(Math.sin(time*5 + i));
        ctx.fillStyle = `rgba(255,255,255,${pulse})`; ctx.shadowColor = color; ctx.shadowBlur = 15;
        ctx.beginPath(); ctx.arc(bx, by, thickness*(1+pulse), 0, Math.PI*2); ctx.fill();
      } else {
        ctx.font = `${thickness*3 + 10}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline='middle';
        ctx.shadowColor = color; ctx.shadowBlur = 10;
        ctx.fillText(e, bx, by + Math.sin(time*2 + i)*5);
      }
    }
  }
  else if (style === 'arrow') {
    ctx.shadowColor = color; ctx.shadowBlur = 15; ctx.strokeStyle = color+'88'; ctx.lineWidth = thickness*2;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1, cy1, cx2, cy2, x2, y2); ctx.stroke();
    ctx.strokeStyle = color; ctx.lineWidth = thickness;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1, cy1, cx2, cy2, x2, y2); ctx.stroke();
    const tS = 0.05, tE = 0.95;
    const px1 = Math.pow(1-tS,3)*x1 + 3*Math.pow(1-tS,2)*tS*cx1 + 3*(1-tS)*tS*tS*cx2 + Math.pow(tS,3)*x2;
    const py1 = Math.pow(1-tS,3)*y1 + 3*Math.pow(1-tS,2)*tS*cy1 + 3*(1-tS)*tS*tS*cy2 + Math.pow(tS,3)*y2;
    const px2 = Math.pow(1-tE,3)*x1 + 3*Math.pow(1-tE,2)*tE*cx1 + 3*(1-tE)*tE*tE*cx2 + Math.pow(tE,3)*x2;
    const py2 = Math.pow(1-tE,3)*y1 + 3*Math.pow(1-tE,2)*tE*cy1 + 3*(1-tE)*tE*tE*cy2 + Math.pow(tE,3)*y2;
    ctx.fillStyle = color;
    ctx.save(); ctx.translate(x1,y1); ctx.rotate(Math.atan2(y1-py1, x1-px1)); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-thickness*4, thickness*2); ctx.lineTo(-thickness*4, -thickness*2); ctx.closePath(); ctx.fill(); ctx.restore();
    ctx.save(); ctx.translate(x2,y2); ctx.rotate(Math.atan2(y2-py2, x2-px2)); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-thickness*4, thickness*2); ctx.lineTo(-thickness*4, -thickness*2); ctx.closePath(); ctx.fill(); ctx.restore();
  }
  else {
    ctx.shadowColor = color; ctx.shadowBlur = 18; ctx.strokeStyle = color+'55'; ctx.lineWidth = thickness*3;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1, cy1, cx2, cy2, x2, y2); ctx.stroke();
    ctx.strokeStyle = color; ctx.lineWidth = thickness; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(cx1, cy1, cx2, cy2, x2, y2); ctx.stroke();
  }
  ctx.restore();
}

/* ============================================================
   TOOLTIP
   ============================================================ */
const tooltipBox = document.getElementById('tooltip-box');

function showTooltip(e, card) {
  const tt  = CONFIG.style?.tooltip || {};
  const txt = card.dataset.ttText || '';
  const img = card.dataset.ttImg  || '';
  if (!txt && !img) return;

  tooltipBox.innerHTML = '';
  tooltipBox.style.background   = tt.bg     || '#222';
  tooltipBox.style.color        = tt.color  || '#00ffcc';
  tooltipBox.style.borderRadius = (tt.radius || 8) + 'px';
  tooltipBox.style.boxShadow    = `0 0 16px ${tt.glow || '#00ffcc'}`;
  tooltipBox.style.border       = `1px solid ${tt.glow || '#00ffcc'}55`;

  if (txt) {
    const span = document.createElement('div');
    span.textContent = txt;
    tooltipBox.appendChild(span);
  }
  if (img) {
    const i = document.createElement('img');
    i.src = img;
    tooltipBox.appendChild(i);
  }

  tooltipBox.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  let x = e.clientX + 14;
  let y = e.clientY + 14;
  if (x + 270 > window.innerWidth)  x = e.clientX - 280;
  if (y + 200 > window.innerHeight) y = e.clientY - 210;
  tooltipBox.style.left = x + 'px';
  tooltipBox.style.top  = y + 'px';
}

function hideTooltip() {
  tooltipBox.style.display = 'none';
}

/* ============================================================
   ФИНАЛЬНЫЙ ФИДБЕК
   ============================================================ */
function showFeedback() {
  playSound('win');

  const fb = CONFIG.feedback || {};
  if (!fb.mode || fb.mode === 'none') return;

  const box      = document.getElementById('feedback-box');
  const imgEl    = document.getElementById('feedback-img');
  const textEl   = document.getElementById('feedback-text');

  /* Координаты из редактора */
  box.style.position = 'absolute';
  box.style.left = (fb.x || 300) + 'px';
  box.style.top = (fb.y || 200) + 'px';
  box.style.width = (fb.w || 300) + 'px';
  if (fb.h && fb.h > 20) box.style.height = fb.h + 'px';

  /* Стили блока */
  box.style.background   = fb.bgColor     || '#0a0a0f';
  box.style.border       = `${fb.borderWidth || 0}px solid ${fb.borderColor || '#00ffcc'}`;
  box.style.borderRadius = (fb.radius || 16) + 'px';
  box.style.boxShadow    = `0 0 30px ${fb.glowColor || '#00ffcc'}`;

  /* Картинка */
  if ((fb.mode === 'both' || fb.mode === 'image') && fb.img) {
    imgEl.src           = fb.img;
    imgEl.style.width   = (fb.imgWidth || 320) + 'px';
    imgEl.style.display = 'block';
  } else {
    imgEl.style.display = 'none';
  }

  /* Текст */
  if (fb.mode === 'both' || fb.mode === 'text') {
    textEl.textContent  = fb.text || '🎉 Отлично!';
    textEl.style.color  = fb.textColor  || '#fff';
    textEl.style.fontSize = (fb.fontSize || 28) + 'px';
    textEl.style.fontFamily = fb.font
      ? `"${fb.font}", sans-serif`
      : (CONFIG.font ? `"${CONFIG.font}", sans-serif` : 'sans-serif');
    textEl.style.display = 'block';

    /* MathJax в тексте фидбека */
    if (/\$|\\\(/.test(textEl.textContent) && window.MathJax?.typesetPromise) {
      MathJax.typesetPromise([textEl]).catch(() => {});
    }
  } else {
    textEl.style.display = 'none';
  }

  /* Анимация */
  const anim = fb.anim || 'popUp';
  if (anim !== 'none') {
    box.style.animation = `${anim} 0.55s cubic-bezier(0.34,1.56,0.64,1) both`;
  } else {
    box.style.animation = 'none';
  }

  box.classList.add('show');
}

/* ============================================================
   УТИЛИТЫ
   ============================================================ */
function hexToRgba(hex, alpha) {
  if (!hex) return `rgba(0,0,0,${alpha})`;
  const h = hex.replace('#','');
  const r = parseInt(h.slice(0,2), 16);
  const g = parseInt(h.slice(2,4), 16);
  const b = parseInt(h.slice(4,6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

   ЗАПУСК
   ============================================================ */
